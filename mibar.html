<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bar Digital</title>
    <style>
        /* Paleta de Colores: Negro y Violeta Neón con toques Cromados */
        :root {
            --bg-color: #050505; 
            --neon-violet: #DBB5FF; 
            --neon-violet-dim: rgba(219, 181, 255, 0.3);
            --text-main: #f0f0f0;
            --text-muted: #999;
            --glass-bg: rgba(20, 20, 25, 0.75);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100%;
            background-image: radial-gradient(var(--neon-violet-dim) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* --- Pantalla de Inicio (Neon Sign) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-sign {
            font-size: 5rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 12px;
            color: transparent;
            -webkit-text-stroke: 2px var(--neon-violet);
            text-shadow: 0 0 15px var(--neon-violet-dim);
            animation: flicker 4s infinite alternate;
            margin: 0; text-align: center;
        }

        .splash-subtitle {
            margin-top: 15px; font-size: 1rem; color: var(--neon-violet);
            letter-spacing: 5px; text-transform: uppercase; opacity: 0.8;
            text-align: center;
        }

        .click-to-enter {
            margin-top: 40px; font-size: 0.9rem; color: var(--text-muted);
            border: 1px solid var(--text-muted); padding: 8px 20px;
            border-radius: 20px; animation: pulse-border 2s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                color: var(--neon-violet);
                text-shadow: 0 0 10px var(--neon-violet), 0 0 20px var(--neon-violet), 0 0 40px var(--neon-violet);
            }
            20%, 24%, 55% { color: transparent; text-shadow: none; }
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(219, 181, 255, 0.2); color: rgba(255,255,255,0.5); }
            50% { border-color: var(--neon-violet); color: var(--neon-violet); box-shadow: 0 0 10px var(--neon-violet-dim); }
        }

        /* --- Contenedor Principal (App) --- */
        #app {
            display: none; max-width: 1200px; margin: 0 auto;
            padding: 40px 20px; box-sizing: border-box; flex-direction: column;
            animation: fade-in-up 0.8s ease-out forwards;
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; margin-bottom: 40px; }

        h1.main-title {
            color: var(--neon-violet); letter-spacing: 4px;
            text-transform: uppercase; font-size: 2.5rem; margin-bottom: 25px;
            text-shadow: 0 0 15px var(--neon-violet-dim);
        }

        /* Navegación y Filtros */
        .category-buttons {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px;
            border: 1px solid #222; backdrop-filter: blur(5px);
        }

        button.cat-btn {
            background: transparent; color: var(--text-muted); border: none;
            padding: 10px 25px; font-size: 1rem; border-radius: 20px;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }

        button.cat-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        button.cat-btn.active {
            background-color: var(--neon-violet); color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-violet-dim);
        }

        /* --- Cuadrícula de Recetas --- */
        #recipe-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; width: 100%;
        }

        .recipe-item {
            background: var(--glass-bg); padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            backdrop-filter: blur(12px); position: relative; overflow: hidden;
        }

        .recipe-item::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(219, 181, 255, 0.1) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s; z-index: 0;
        }

        .recipe-item:hover {
            transform: translateY(-8px); border-color: var(--neon-violet);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px var(--neon-violet-dim);
        }
        .recipe-item:hover::before { opacity: 1; }
        .recipe-item > * { position: relative; z-index: 1; }

        .item-emoji { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .item-name { font-size: 1.3rem; font-weight: bold; color: var(--text-main); margin-bottom: 10px; }
        .item-preview {
            font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;
            max-width: 90%; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; font-style: italic;
        }

        /* --- Ventana Emergente (Modal) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; transition: opacity 0.3s ease; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-content {
            background: #111; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 550px; position: relative;
            border: 1px solid var(--neon-violet);
            box-shadow: 0 0 40px rgba(219, 181, 255, 0.15), inset 0 0 20px rgba(219, 181, 255, 0.05);
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 85vh; overflow-y: auto;
        }

        .modal-overlay.show .modal-content { transform: scale(1) translateY(0); }

        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: #000; border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--neon-violet-dim); border-radius: 10px; }

        .close-btn {
            position: absolute; top: 15px; right: 25px; font-size: 2.5rem;
            cursor: pointer; color: var(--text-muted); transition: color 0.2s; line-height: 1;
        }
        .close-btn:hover { color: var(--neon-violet); text-shadow: 0 0 10px var(--neon-violet); }

        .modal-header {
            text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px; margin-bottom: 25px;
        }

        .modal-emoji { font-size: 4.5rem; margin: 0 0 10px 0; filter: drop-shadow(0 0 15px var(--neon-violet-dim)); }
        .details-title {
            color: var(--neon-violet); margin: 0; font-size: 2rem;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .modal-category-tag {
            display: inline-block; background: rgba(219, 181, 255, 0.1);
            color: var(--neon-violet); padding: 4px 12px; border-radius: 15px;
            font-size: 0.8rem; margin-top: 10px; border: 1px solid var(--neon-violet-dim);
        }

        h3 {
            color: #fff; margin-top: 25px; font-size: 1.1rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 5px;
        }
        h3::before {
            content: ''; display: block; width: 8px; height: 8px;
            background: var(--neon-violet); border-radius: 50%; box-shadow: 0 0 8px var(--neon-violet);
        }

        ul, ol { line-height: 1.8; color: #ccc; padding-left: 20px; }
        li::marker { color: var(--neon-violet); font-weight: bold; }
        li strong { color: #fff; }
        .prep-list li { margin-bottom: 5px; list-style-type: square; }

        /* ========================================= */
        /* ADAPTACIÓN PARA MÓVILES (Media Queries)   */
        /* ========================================= */
        @media (max-width: 768px) {
            /* Pantalla de inicio */
            .neon-sign { font-size: 3.2rem; letter-spacing: 8px; }
            .splash-subtitle { font-size: 0.85rem; letter-spacing: 3px; }

            /* Encabezado */
            #app { padding: 20px 10px; }
            h1.main-title { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 20px; }
            
            /* Botones del menú */
            .category-buttons { gap: 8px; padding: 8px; border-radius: 15px; }
            button.cat-btn { padding: 8px 14px; font-size: 0.85rem; border-radius: 12px; }

            /* Cuadrícula a una sola columna */
            #recipe-list { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }

            /* Reducir tamaño de las tarjetas */
            .recipe-item { padding: 15px; border-radius: 12px; }
            .item-emoji { font-size: 2.8rem; margin-bottom: 10px; }
            .item-name { font-size: 1.1rem; }

            /* Ajustes de la Ventana Emergente (Modal) */
            .modal-content { 
                padding: 25px 20px; 
                max-height: 90vh; 
                border-radius: 15px;
            }
            .close-btn { top: 10px; right: 15px; font-size: 2rem; }
            .modal-emoji { font-size: 3.5rem; }
            .details-title { font-size: 1.5rem; }
            h3 { font-size: 1rem; margin-top: 20px; }
            ul, ol { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="splash-screen" onclick="enterBar()">
        <h1 class="neon-sign">Mi Bar</h1>
        <div class="splash-subtitle">Digital Mixology</div>
        <div class="click-to-enter">INGRESAR AL MENÚ</div>
    </div>

    <!-- Contenedor Principal -->
    <div id="app" class="hidden">
        <header>
            <h1 class="main-title">Menú de Bebidas</h1>
            <div class="category-buttons">
                <button class="cat-btn active" id="btn-all" onclick="loadCategory('Todas', this)">Todas</button>
                <button class="cat-btn" onclick="loadCategory('Vodka', this)">Vodka</button>
                <button class="cat-btn" onclick="loadCategory('Tequila', this)">Tequila</button>
                <button class="cat-btn" onclick="loadCategory('Ron', this)">Ron</button>
                <button class="cat-btn" onclick="loadCategory('Café', this)">Café</button>
            </div>
        </header>

        <main>
            <div id="recipe-list"></div>
        </main>
    </div>

    <!-- Ventana Emergente (Modal) -->
    <div id="drink-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                <!-- Se inyecta con JS -->
            </div>
        </div>
    </div>

        function enterBar() {
            const splash = document.getElementById('splash-screen');
            const app = document.getElementById('app');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                app.style.display = 'flex';
                document.getElementById('btn-all').click();
            }, 800);
        }

        function getPreviewText(ingredientsList) {
            if(ingredientsList.length <= 2) return ingredientsList.join(', ');
            return ingredientsList.slice(0, 2).join(', ') + '...';
        }

        function loadCategory(categoryName, btnElement) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const listContainer = document.getElementById('recipe-list');
            listContainer.innerHTML = ''; 

            let drinksToRender = [];

            if(categoryName === 'Todas') {
                Object.keys(cocktails).forEach(key => {
                    cocktails[key].forEach(drink => {
                        drinksToRender.push({ ...drink, category: key });
                    });
                });
            } else {
                drinksToRender = cocktails[categoryName].map(drink => ({ ...drink, category: categoryName }));
            }
            
            drinksToRender.forEach((drink) => {
                const item = document.createElement('div');
                item.className = 'recipe-item';
                const previewStr = getPreviewText(drink.ingredients);
                item.innerHTML = `
                    <div class="item-emoji">${drink.emoji}</div>
                    <div class="item-name">${drink.name}</div>
                    <div class="item-preview">${previewStr}</div>
                `;
                item.onclick = () => showRecipeModal(drink);
                listContainer.appendChild(item);
            });
        }

        function showRecipeModal(drink) {
            const modal = document.getElementById('drink-modal');
            const modalBody = document.getElementById('modal-body');
            
            let ingHTML = '<ul>';
            drink.ingredients.forEach(ing => { ingHTML += `<li>${ing}</li>`; });
            ingHTML += '</ul>';

            let stepsHTML = '<ol>';
            drink.steps.forEach(step => { stepsHTML += `<li>${step}</li>`; });
            stepsHTML += '</ol>';

            modalBody.innerHTML = `
                <div class="modal-header">
                    <p class="modal-emoji">${drink.emoji}</p>
                    <h2 class="details-title">${drink.name}</h2>
                    <span class="modal-category-tag">Base: ${drink.category}</span>
                </div>
                
                <h3>🥃 Cristalería y Vaso</h3>
                <ul class="prep-list">
                    <li><strong>Vaso recomendado:</strong> ${drink.glass}</li>
                    <li><strong>Preparación previa:</strong> ${drink.prep}</li>
                </ul>

                <h3>🛒 Ingredientes</h3>
                ${ingHTML}
                
                <h3>🧊 Preparación en el Shaker</h3>
                ${stepsHTML}
            `;

            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('show'); }, 10);
        }

        function closeModal(event) {
            const modal = document.getElementById('drink-modal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    </script>
